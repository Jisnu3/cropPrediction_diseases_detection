{% extends 'base.html' %}
{% load static %}
<title>
  {% block title %}
    Profile
  {% endblock %}
</title>

{% block content %}
  <div class="row g-4">
    <div class="col-lg-7">
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h3 class="mb-3"><i class="fa-solid fa-user-pen"></i>Edit Profile</h3>

          <form method="post" id="profileForm">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
                <!-- <input type="text" name="name" class="form-control" value="{{request.user.first_name}} {{request.user.last_name}}" placeholder="e.g., Test User" /> -->
                <input type="text" name="name" class="form-control" value="{{ full_name }}" placeholder="e.g., Test User" />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fa-regular fa-phone"></i></span>
                <input type="number" name="phone" class="form-control" value="{{ profile.phone }}" placeholder="e.g., 7684******" />
              </div>
            </div>

            <div class="mb-3 text-muted">
              <span>{{ request.user.username }}</span>
            </div>
            <a href="{% url 'change_password' %}" class="btn btn-warning mt-3"><i class="fa-solid fa-key"></i> Change Password</a>

            <button class="btn btn-success mt-3 w-100" type="submit" id="signupBtn"><i class="fa-solid fa-save"></i><span>Save Changes</span></button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-5"></div> <!-- Col 2 end -->
  </div>

  <script></script>
{% endblock %}
